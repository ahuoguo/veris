name: Verify with Verus

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust 1.95.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Download Verus
        run: |
          wget https://github.com/verus-lang/verus/releases/download/release%2F0.2026.05.17.e479cce/verus-0.2026.05.17.e479cce-x86-linux.zip
          unzip verus-0.2026.05.17.e479cce-x86-linux.zip

      - name: Add Verus to PATH
        run: echo "$(pwd)/verus-x86-linux/" >> $GITHUB_PATH

      - name: cargo verus verify -p ub
        working-directory: .
        run: cargo verus verify -p ub
